<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>無障礙內文潤飾工具</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css">
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --success: #16a34a;
      --warning: #d97706;
      --danger: #dc2626;
      --bg: #f1f5f9;
      --panel: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }

    .logo { text-align: center; }
    .logo h1 { font-size: 1.1rem; font-weight: 700; }
    .logo p  { font-size: .72rem; color: var(--muted); margin-top: 1px; }

    .level-toggle {
      display: flex;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
      gap: 2px;
    }
    .level-toggle button {
      padding: 6px 18px;
      border: none;
      border-radius: 6px;
      font-size: .85rem;
      font-weight: 700;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      transition: all .15s;
    }
    .level-toggle button.active {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 1px 4px rgba(37,99,235,.35);
    }

    /* ── Control Bar ── */
    .control-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      background: var(--panel);
      padding: 14px 24px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      margin-bottom: 4px;
    }
    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
      border-right: 1px solid var(--border);
      padding-right: 16px;
    }
    .control-group:last-child { border-right: none; padding-right: 0; }
    .control-label {
      font-size: .8rem;
      color: var(--text);
      font-weight: 600;
      white-space: nowrap;
    }
    .control-bar select {
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: .85rem;
      background: #fff;
      color: var(--text);
      cursor: pointer;
      outline: none;
    }
    input[type="color"] {
      cursor: pointer;
      width: 30px;
      height: 30px;
      padding: 0;
      border: none;
      border-radius: 6px;
      outline: none;
    }

    /* ── Layout ── */
    main {
      max-width: 1440px;
      margin: 0 auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    /* ── Panel ── */
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      min-height: 520px;
      overflow: hidden;
    }

    .panel-head {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .panel-head h2 {
      font-size: .75rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .panel-actions { display: flex; gap: 6px; }

    .btn-sm {
      padding: 5px 11px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      font-size: .78rem;
      cursor: pointer;
      color: var(--muted);
      transition: all .15s;
      white-space: nowrap;
    }
    .btn-sm:hover { border-color: var(--primary); color: var(--primary); }
    .btn-sm:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Textarea ── */
    #input {
      flex: 1;
      border: none;
      outline: none;
      padding: 16px;
      font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace;
      font-size: .8rem;
      line-height: 1.65;
      resize: none;
      color: var(--text);
    }
    #input::placeholder { color: #cbd5e1; }

    .panel-foot {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .char-count { font-size: .74rem; color: var(--muted); }

    #btn-submit {
      padding: 9px 22px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: background .15s;
    }
    #btn-submit:hover:not(:disabled) { background: var(--primary-dark); }
    #btn-submit:disabled { background: #94a3b8; cursor: not-allowed; }

    /* Ctrl+Enter hint */
    .shortcut-hint {
      font-size: .7rem;
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    kbd {
      background: #e2e8f0;
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      padding: 1px 5px;
      font-size: .7rem;
      font-family: inherit;
    }

    /* ── Output ── */
    #output {
      flex: 1;
      overflow: auto;
      position: relative;
    }
    #output pre {
      margin: 0;
      min-height: 100%;
    }
    #output pre code {
      font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace;
      font-size: .8rem;
      line-height: 1.65;
      border-radius: 0 !important;
    }

    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 400px;
      gap: 12px;
      color: #cbd5e1;
      text-align: center;
      padding: 40px;
      font-size: .9rem;
    }

    /* ── Loading ── */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      gap: 14px;
      color: var(--muted);
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Report ── */
    .report {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .report-head {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    .report-head h2 {
      font-size: .75rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .report-stats { display: flex; gap: 8px; flex-wrap: wrap; }
    .stat {
      font-size: .78rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .stat-fix     { background: #dcfce7; color: var(--success); }
    .stat-clean   { background: #dbeafe; color: var(--primary); }
    .stat-warning { background: #fef3c7; color: var(--warning); }

    .report-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .change-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: .875rem;
    }
    .change-item.fix     { background: #f0fdf4; border: 1px solid #bbf7d0; }
    .change-item.clean   { background: #eff6ff; border: 1px solid #bfdbfe; }
    .change-item.warning { background: #fffbeb; border: 1px solid #fde68a; }
    .change-icon { flex-shrink: 0; line-height: 1.5; }
    .change-desc { line-height: 1.55; }
    .change-wcag { font-size: .73rem; color: var(--muted); margin-top: 2px; }

    /* ── Error ── */
    .error-box {
      margin: 16px;
      padding: 14px 16px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      color: var(--danger);
      font-size: .875rem;
      line-height: 1.5;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: .875rem;
      opacity: 0;
      transition: opacity .2s;
      pointer-events: none;
      z-index: 999;
    }
    #toast.show { opacity: 1; }

    /* ── Responsive ── */
    @media (max-width: 800px) {
      .panels { grid-template-columns: 1fr; }
      main { padding: 16px; }
      .shortcut-hint { display: none; }
    }

    /* ── Output Tabs ── */
    .panel-head-left { display: flex; align-items: center; gap: 12px; }
    .output-tabs { display: flex; gap: 4px; }
    .tab-btn {
      padding: 4px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      font-size: .75rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--muted);
      transition: all .15s;
    }
    .tab-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .tab-btn:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
    #preview-frame {
      flex: 1;
      border: none;
      width: 100%;
      min-height: 480px;
      display: none;
    }
    .streaming-indicator {
      padding: 2.5rem 1rem;
      text-align: center;
      color: var(--muted);
      font-size: .9rem;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .35; }
    }
  </style>
</head>
<body>

<!-- ══ Header ══ -->
<header>
  <div class="logo">
    <h1>無障礙內文潤飾工具</h1>
    <p>WCAG 2.2 AAA 自動清理與修復</p>
  </div>
</header>

<!-- ══ Main ══ -->
<main>
  <!-- 控制面板 (置中) -->
  <div class="control-bar">
    <div class="control-group">
      <label class="control-label" for="page-bg-color">頁面主體背景色</label>
      <input type="color" id="page-bg-color" value="#ffffff" title="設定發布頁面的預定背景色以計算對比">
    </div>
    <div class="control-group">
      <div class="level-toggle">
        <button id="btn-aa"  onclick="setLevel('AA')">AA</button>
        <button id="btn-aaa" onclick="setLevel('AAA')" class="active">AAA</button>
      </div>
    </div>
  </div>

  <div class="panels">

    <!-- 輸入 -->
    <div class="panel">
      <div class="panel-head">
        <h2>輸入內容</h2>
        <div class="panel-actions">
          <button class="btn-sm" onclick="clearInput()">清除</button>
        </div>
      </div>
      <textarea id="input"
        placeholder="貼上 HTML 原始碼，或從 Word / Google Docs 複製的內容..."
        oninput="updateCount()"></textarea>
      <div class="panel-foot">
        <span class="shortcut-hint"><kbd>Ctrl</kbd>+<kbd>Enter</kbd> 送出</span>
        <span class="char-count" id="char-count">0 字元</span>
        <button id="btn-submit" onclick="run()">
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
              d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
          開始修復
        </button>
      </div>
    </div>

    <!-- 輸出 -->
    <div class="panel">
      <div class="panel-head">
        <div class="panel-head-left">
          <h2>修復結果</h2>
          <div class="output-tabs" role="tablist" aria-label="輸出檢視模式">
            <button type="button" class="tab-btn active" id="tab-code" role="tab" aria-selected="true" onclick="showTab('code')">原始碼</button>
            <button type="button" class="tab-btn" id="tab-preview" role="tab" aria-selected="false" onclick="showTab('preview')">預覽</button>
          </div>
        </div>
        <div class="panel-actions">
          <button class="btn-sm" id="btn-reuse"    onclick="reuse()"    style="display:none">← 送回輸入</button>
          <button class="btn-sm" id="btn-copy"     onclick="copyHTML()" style="display:none">複製</button>
          <button class="btn-sm" id="btn-download" onclick="download()" style="display:none">下載 .html</button>
        </div>
      </div>
      <div id="output">
        <div class="placeholder">
          <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586
                 a1 1 0 01.707.293l5.414 5.414A1 1 0 0119 9.414V19a2 2 0 01-2 2z"/>
          </svg>
          修復後的 HTML 將顯示在這裡
        </div>
      </div>
      <iframe id="preview-frame" sandbox="allow-same-origin" title="修復後 HTML 靜態預覽"></iframe>
    </div>
  </div>

  <!-- 修改報告 -->
  <div class="report" id="report" style="display:none">
    <div class="report-head">
      <h2>修改報告</h2>
      <div class="report-stats" id="report-stats"></div>
    </div>
    <div class="report-body" id="report-body"></div>
  </div>
</main>

<div id="toast">已複製到剪貼簿</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
// ════════════════════════════════════════════
//  設定區：部署 Cloudflare Worker 後填入網址
// ════════════════════════════════════════════
const WORKER_URL = 'https://weathered-boat-76be.love520297.workers.dev';
// ════════════════════════════════════════════

let level = 'AAA';
let lastOutput = '';
let currentTab = 'code';

function showTab(tab) {
  currentTab = tab;
  const codeEl  = document.getElementById('output');
  const frameEl = document.getElementById('preview-frame');
  const tabCode = document.getElementById('tab-code');
  const tabPrev = document.getElementById('tab-preview');
  const isPreview = tab === 'preview';
  codeEl.style.display  = isPreview ? 'none' : '';
  frameEl.style.display = isPreview ? 'block' : 'none';
  tabCode.classList.toggle('active', !isPreview);
  tabPrev.classList.toggle('active',  isPreview);
  tabCode.setAttribute('aria-selected', String(!isPreview));
  tabPrev.setAttribute('aria-selected', String(isPreview));
}

// ════════════════════════════════════════════
//  顏色對比度精準運算工具 (JavaScript 色彩演算法)
// ════════════════════════════════════════════
function hexToRgb(hex) {
  let c = hex.substring(1).split('');
  if (c.length === 3) c = [c[0], c[0], c[1], c[1], c[2], c[2]];
  c = '0x' + c.join('');
  return [(c >> 16) & 255, (c >> 8) & 255, c & 255];
}

function parseColorToRgb(colorStr) {
  if (!colorStr) return null;
  colorStr = colorStr.trim();
  if (colorStr.startsWith('#')) return hexToRgb(colorStr);
  let rgbMatch = colorStr.match(/^rgba?\((\d+),\s*(\d+),\s*(\d+)/i);
  if (rgbMatch) return [parseInt(rgbMatch[1]), parseInt(rgbMatch[2]), parseInt(rgbMatch[3])];
  if(colorStr === 'white') return [255,255,255];
  if(colorStr === 'black') return [0,0,0];
  return null;
}

function RgbToHex(r, g, b) {
  return "#" + (1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1).toUpperCase();
}

function getLuminance(r, g, b) {
  let a = [r, g, b].map(function (v) {
    v /= 255;
    return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
  });
  return a[0] * 0.2126 + a[1] * 0.7152 + a[2] * 0.0722;
}

function getContrastRatio(l1, l2) {
  let lightest = Math.max(l1, l2);
  let darkest = Math.min(l1, l2);
  return (lightest + 0.05) / (darkest + 0.05);
}

function getTargetRatio(fontSizeStr, fontWeightStr, level) {
  let isLarge = false;
  let pt = 12; 
  if (fontSizeStr) {
    let matchPx = fontSizeStr.match(/(\d+(?:\.\d+)?)px/i);
    let matchPt = fontSizeStr.match(/(\d+(?:\.\d+)?)pt/i);
    if (matchPx) pt = parseFloat(matchPx[1]) * 0.75;
    if (matchPt) pt = parseFloat(matchPt[1]);
  }
  let isBold = fontWeightStr && (fontWeightStr === 'bold' || parseInt(fontWeightStr) >= 700);
  if (pt >= 18 || (pt >= 14 && isBold)) isLarge = true;
  if (level === 'AAA') return isLarge ? 4.5 : 7.0;
  return isLarge ? 3.0 : 4.5;
}

function adjustColorForContrast(rgbText, rgbBg, targetRatio) {
  let bgLum = getLuminance(...rgbBg);
  let textLum = getLuminance(...rgbText);
  let ratio = getContrastRatio(textLum, bgLum);
  if (ratio >= targetRatio) return { rgb: rgbText, adjusted: false };
  
  let isBgLight = bgLum > 0.5;
  let [r, g, b] = rgbText;
  let step = 2; 
  
  let loopCount = 0;
  while (ratio < targetRatio && loopCount < 100) {
    if (isBgLight) {
      r = Math.max(0, r - step);
      g = Math.max(0, g - step);
      b = Math.max(0, b - step);
    } else {
      r = Math.min(255, r + step);
      g = Math.min(255, g + step);
      b = Math.min(255, b + step);
    }
    textLum = getLuminance(r, g, b);
    ratio = getContrastRatio(textLum, bgLum);
    loopCount++;
    if ((r===0 && g===0 && b===0) || (r===255 && g===255 && b===255)) break;
  }
  return { rgb: [r, g, b], adjusted: true };
}

function processHTMLContrast(htmlStr, pageBgHex, wcagLevel) {
  // 防呆：如果是空的就跳過
  if (!htmlStr || !htmlStr.trim()) return { html: htmlStr, count: 0 };
  
  const parser = new DOMParser();
  const doc = parser.parseFromString(htmlStr, 'text/html');
  const pageBgRgb = hexToRgb(pageBgHex);
  let changeCount = 0;

  function checkNode(node, currentBgRgb) {
    if (node.nodeType === Node.ELEMENT_NODE) {
      let nodeBgRgb = currentBgRgb;
      let styleBg = node.style?.backgroundColor || node.style?.background;
      let parsedBg = parseColorToRgb(styleBg);
      if (parsedBg) nodeBgRgb = parsedBg;

      let styleColor = node.style?.color;
      if (styleColor) {
         let parsedColor = parseColorToRgb(styleColor);
         if (parsedColor) {
           let targetRatio = getTargetRatio(node.style?.fontSize, node.style?.fontWeight, wcagLevel);
           let result = adjustColorForContrast(parsedColor, nodeBgRgb, targetRatio);
           if (result.adjusted) {
             node.style.color = RgbToHex(...result.rgb);
             changeCount++;
           }
         }
      }
      for (let child of node.childNodes) checkNode(child, nodeBgRgb);
    }
  }
  
  for (let child of doc.body.childNodes) checkNode(child, pageBgRgb);
  return { html: doc.body.innerHTML, count: changeCount };
}

function setLevel(v) {
  level = v;
  document.getElementById('btn-aa').classList.toggle('active',  v === 'AA');
  document.getElementById('btn-aaa').classList.toggle('active', v === 'AAA');
}

function clearInput() {
  document.getElementById('input').value = '';
  updateCount();
}

function updateCount() {
  const n = document.getElementById('input').value.length;
  document.getElementById('char-count').textContent = n.toLocaleString() + ' 字元';
}

function reuse() {
  document.getElementById('input').value = lastOutput;
  updateCount();
  resetOutput();
}

function resetOutput() {
  lastOutput = '';
  document.getElementById('output').innerHTML = `
    <div class="placeholder">
      <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586
             a1 1 0 01.707.293l5.414 5.414A1 1 0 0119 9.414V19a2 2 0 01-2 2z"/>
      </svg>
      修復後的 HTML 將顯示在這裡
    </div>`;
  document.getElementById('preview-frame').srcdoc = '';
  showTab('code');
  ['btn-copy','btn-download','btn-reuse'].forEach(id =>
    document.getElementById(id).style.display = 'none');
  document.getElementById('report').style.display = 'none';
}

function copyHTML() {
  navigator.clipboard.writeText(lastOutput).then(() => showToast('已複製到剪貼簿'));
}

function download() {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([lastOutput], { type: 'text/html' }));
  a.download = 'accessible.html';
  a.click();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── SSE 串流讀取輔助函式 ──
async function streamText(body) {
  const res = await fetch(WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) {
    const errText = await res.text().catch(() => '');
    let errBody = {};
    try { errBody = JSON.parse(errText); } catch (_) {}
    throw new Error(`伺服器錯誤 ${res.status}：${errBody?.error?.message || errText || `HTTP ${res.status}`}`);
  }
  const reader  = res.body.getReader();
  const decoder = new TextDecoder();
  let sseBuffer = '';
  let fullText  = '';

  function parseSseLine(line) {
    if (!line.startsWith('data:')) return;
    const raw = line.slice(5).trim();
    if (!raw || raw === '[DONE]') return;
    let evt;
    try { evt = JSON.parse(raw); } catch (_) { return; }
    if (evt.type === 'content_block_delta' && evt.delta?.type === 'text_delta') {
      fullText += evt.delta.text;
    }
    if (evt.type === 'error') throw new Error(evt.error?.message || 'API 串流錯誤');
  }

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    sseBuffer += decoder.decode(value, { stream: true });
    const lines = sseBuffer.split('\n');
    sseBuffer = lines.pop();
    for (const line of lines) parseSseLine(line);
  }
  if (sseBuffer.trim()) parseSseLine(sseBuffer);
  return fullText;
}

// ── 主流程 ──
async function run() {
  const input = document.getElementById('input').value.trim();
  if (!input) { showToast('請先貼上內容'); return; }
  if (input.length > 20000) {
    showToast(`⚠️ 內容共 ${input.length.toLocaleString()} 字元，超過建議上限 20,000 字。大型表格可能因 AI 輸出 token 上限而截斷，建議分段貼入。`);
  }

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.innerHTML = `<div class="spinner" style="width:15px;height:15px;border-width:2px;margin:0"></div> 處理中...`;

  const bgColor = document.getElementById('page-bg-color').value;

  document.getElementById('output').innerHTML =
    `<div class="loading"><div class="spinner"></div><p>正在分析並修復...</p></div>`;
  document.getElementById('report').style.display = 'none';
  ['btn-copy','btn-download','btn-reuse'].forEach(id =>
    document.getElementById(id).style.display = 'none');

  // ── CALL 1：修復 HTML 結構，inline style → class ──
  const systemPromptHTML = `你是一位精通 WCAG 2.2 ${level} 無障礙規範的前端開發者。

## 核心目標
- 符合 WCAG 2.2 ${level} 標準的無障礙結構（${level === 'AAA' ? '對比比例需達 7:1' : '對比比例需達 4.5:1 一般 / 3:1 大字'}）
- 視覺整潔且易於閱讀的原始碼，標題從 h3 開始、嚴格遞增
- 所有 inline style="" 轉為語意化 class=""，CSS 由後續步驟獨立生成

---

## 第一部分：前置清理

移除 Microsoft Word / Google Docs 殘留標籤（mso-*、docs-internal-guid-*、<o:p>、MsoNormal class）。
清理多餘 <span> 巢套、移除 Comic Sans MS 等不適合閱讀的字體宣告。
移除僅含空白或 &nbsp; 的空標籤；超過 2 個連續 <br> 只保留 1 個。
【重要】輸入若含有 <style> 區塊：保留其中所有有效宣告，記錄 class 名稱供後續使用。

---

## 第二部分：結構與語意規範

1. 標題層次：固定從 <h3> 開始，嚴格遞增（h3 → h4 → h5），嚴禁跨級。
2. 語意標籤：嚴禁用 div/span 模擬互動元件，必須用原生 <button> 或 <a>。
3. ARIA 標註：為所有有意義的元件添加 role 與 aria-* 屬性（aria-expanded、aria-label 等）。
4. 超連結：嚴禁裸露 URL；外部連結補齊 target="_blank" rel="noopener noreferrer"；加 aria-label 與 title。
5. 圖片：嚴禁修改原始 src 路徑；alt 為空時依內容填補；固定像素寬高改為 class（max-width: 100%; height: auto）。
6. 文件下載連結：Word → DOCX+ODT；Excel → XLSX+ODS；PDF 閱讀 → 單一 PDF；PDF 填寫 → PDF+可編輯格式。
7. 語意化清單：手動編號段落轉 <ol><li>；項目符號轉 <ul><li>。
8. 表格與 iframe：<table> 補 <th scope="col/row"> 與 <caption>；iframe 補 title。
9. 內容完整性：必須完整保留所有文字內容與資訊架構，嚴禁刪減或竄改。

---

## 第三部分：inline style 轉換規則

- 為每個 inline style 取一個有意義的 class 名稱（如 .img-banner、.label-warning、.link-highlight）
- 移除 style="" 屬性，改用 class=""
- 嚴禁在此步驟輸出 <style> 標籤或任何 CSS 規則，CSS 由後續 API 呼叫獨立生成

---

## 輸出規範（嚴格遵守）

- 嚴禁 HTML 標籤內出現 inline style="" 屬性
- 嚴禁輸出 <style> 標籤（CSS 另行生成）
- 嚴禁輸出 <!DOCTYPE html>、<html>、<head>、<body> 等文件結構標籤
- 你的回應第一個字元必須是 ===HTML_START===，禁止在此之前輸出任何文字

請嚴格依以下格式回傳：

===HTML_START===
<!-- 修復後的 HTML 結構（無 inline style，改用 class=""）-->
===HTML_END===
===CHANGES_START===
[
  { "type": "clean", "description": "簡短說明清理項目" },
  { "type": "fix",   "description": "簡短說明修復項目", "wcag": "條款編號" }
]
===CHANGES_END===`;

  try {
    document.getElementById('output').innerHTML =
      '<div class="streaming-indicator">⚡ 步驟 1/2：修復 HTML 結構...</div>';

    const htmlRawText = await streamText({
      model: 'claude-sonnet-4-6',
      max_tokens: 6000,
      system: systemPromptHTML,
      messages: [{ role: 'user', content: `請直接從 ===HTML_START=== 開始輸出，不加任何說明或前言：\n\n${input}` }]
    });

    if (!htmlRawText) throw new Error('步驟 1 回應內容為空，請重試');

    // 解析 HTML
    let htmlMatch = htmlRawText.match(/===HTML_START===\r?\n([\s\S]*?)\r?\n===HTML_END===/);
    let truncated = false;
    if (!htmlMatch) {
      const hSep = /===HTML_START===\r?\n/.exec(htmlRawText);
      if (hSep) {
        const after = htmlRawText.slice(hSep.index + hSep[0].length);
        const stop  = after.search(/\r?\n===CHANGES_START===/);
        const extracted = (stop !== -1 ? after.slice(0, stop) : after).trim();
        if (extracted) { htmlMatch = ['', extracted]; truncated = true; }
      }
    }
    if (!htmlMatch) throw new Error(`步驟 1 格式異常。\n\n回應開頭：\n${htmlRawText.slice(0, 400)}`);

    const htmlContent = htmlMatch[1].trim();

    // 解析 CHANGES
    const changesMatch = htmlRawText.match(/===CHANGES_START===\r?\n([\s\S]*?)\r?\n===CHANGES_END===/);
    let changes = [];
    if (changesMatch) {
      try { changes = JSON.parse(changesMatch[1].trim()); } catch (e) {
        changes = [{ type: 'warning', description: '修改報告解析失敗，但 HTML 已修復完成。' }];
      }
    }
    if (truncated) {
      changes.unshift({ type: 'warning', description: '⚠️ 內容過大，AI 輸出已截斷。HTML 可能不完整，建議分段貼入。' });
    }

    // ── CALL 2：根據 HTML 生成 <style> 區塊 ──
    const systemPromptCSS = `你是 CSS 專家。根據提供的 HTML 片段，為所有 class 屬性生成完整的 <style> 區塊。

規格要求：
- :root {} 色彩 CSS 變數（頁面主背景色參考：${bgColor}；所有色彩需符合 WCAG ${level}（${level === 'AAA' ? '7:1' : '4.5:1 一般 / 3:1 大字'}））
- 為 HTML 中每個 class 定義對應 CSS 規則（必須覆蓋 HTML 中出現的所有 class）
- 所有 CSS 宣告加上 !important
- 圖片相關 class：max-width: 100% !important; height: auto !important
- 清單相關 class：保留 list-style-type（disc/decimal）；padding-left: 24px !important；li margin-bottom: 12px !important
- 按鈕 / 強調連結 class：深色背景 + #FFFFFF 文字；:hover 略淺；:focus-visible 需有明確 outline
- 顏色相關 class（如 .label-warning）：確保文字與背景對比達標

直接輸出 <style>...</style>，不加任何說明文字。`;

    document.getElementById('output').innerHTML =
      '<div class="streaming-indicator">🎨 步驟 2/2：生成樣式...</div>';

    const cssRawText = await streamText({
      model: 'claude-sonnet-4-6',
      max_tokens: 2048,
      system: systemPromptCSS,
      messages: [{ role: 'user', content: htmlContent }]
    });

    // 擷取 <style> 區塊
    const styleMatchResult = cssRawText.match(/<style[\s\S]*?<\/style>/i);
    const styleBlock = styleMatchResult ? styleMatchResult[0] : '';

    // 合併輸出（<style> 在最上方）
    const combined = styleBlock ? styleBlock + '\n' + htmlContent : htmlContent;

    // JS 前端對比度運算精準攔截
    const postProcess = processHTMLContrast(combined, bgColor, level);
    lastOutput = postProcess.html;

    let finalChanges = changes;
    if (postProcess.count > 0) {
      finalChanges.push({
        type: 'fix',
        description: `利用色彩演算法動態深淺校正，調整了 ${postProcess.count} 處行內樣式色彩對比度，準確滿足 WCAG ${level} 標準。`,
        wcag: (level === 'AAA' ? '1.4.6' : '1.4.3')
      });
    }

    // 語法高亮顯示
    const escaped = lastOutput
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    document.getElementById('output').innerHTML =
      `<pre><code class="language-html">${escaped}</code></pre>`;
    hljs.highlightAll();

    // 更新預覽 iframe
    document.getElementById('preview-frame').srcdoc = lastOutput;

    // 顯示操作按鈕
    ['btn-copy','btn-download','btn-reuse'].forEach(id =>
      document.getElementById(id).style.display = 'inline-flex');

    // 建立報告
    buildReport(finalChanges);

  } catch (err) {
    document.getElementById('output').innerHTML =
      `<div class="error-box">❌ ${err.message}</div>`;
  }

  btn.disabled = false;
  btn.innerHTML = `<svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"/>
  </svg> 開始修復`;
}

function buildReport(changes) {
  const counts = {};
  changes.forEach(c => { counts[c.type] = (counts[c.type] || 0) + 1; });

  const statsEl = document.getElementById('report-stats');
  statsEl.innerHTML = [
    counts.fix     ? `<span class="stat stat-fix">✅ 修復 ${counts.fix} 項</span>` : '',
    counts.clean   ? `<span class="stat stat-clean">🧹 清理 ${counts.clean} 項</span>` : '',
    counts.warning ? `<span class="stat stat-warning">⚠️ 待確認 ${counts.warning} 項</span>` : ''
  ].join('');

  const icon = { fix: '✅', clean: '🧹', warning: '⚠️' };
  document.getElementById('report-body').innerHTML = changes.map(c => `
    <div class="change-item ${c.type}">
      <span class="change-icon">${icon[c.type] || '•'}</span>
      <div>
        <div class="change-desc">${c.description}</div>
        ${c.wcag ? `<div class="change-wcag">WCAG ${c.wcag}</div>` : ''}
      </div>
    </div>`).join('');

  document.getElementById('report').style.display = 'block';
}

// Ctrl / Cmd + Enter 快捷鍵
document.getElementById('input').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') run();
});
