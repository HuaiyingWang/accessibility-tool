<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>無障礙內文潤飾工具</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css">
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --success: #16a34a;
      --warning: #d97706;
      --danger: #dc2626;
      --bg: #f1f5f9;
      --panel: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }

    .logo { text-align: center; }
    .logo h1 { font-size: 1.1rem; font-weight: 700; }
    .logo p  { font-size: .72rem; color: var(--muted); margin-top: 1px; }

    .level-toggle {
      display: flex;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
      gap: 2px;
    }
    .level-toggle button {
      padding: 6px 18px;
      border: none;
      border-radius: 6px;
      font-size: .85rem;
      font-weight: 700;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      transition: all .15s;
    }
    .level-toggle button.active {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 1px 4px rgba(37,99,235,.35);
    }

    /* ── Control Bar ── */
    .control-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      background: var(--panel);
      padding: 14px 24px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      margin-bottom: 4px;
    }
    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
      border-right: 1px solid var(--border);
      padding-right: 16px;
    }
    .control-group:last-child { border-right: none; padding-right: 0; }
    .control-label {
      font-size: .8rem;
      color: var(--text);
      font-weight: 600;
      white-space: nowrap;
    }
    .control-bar select {
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: .85rem;
      background: #fff;
      color: var(--text);
      cursor: pointer;
      outline: none;
    }
    input[type="color"] {
      cursor: pointer;
      width: 30px;
      height: 30px;
      padding: 0;
      border: none;
      border-radius: 6px;
      outline: none;
    }

    /* ── Layout ── */
    main {
      max-width: 1440px;
      margin: 0 auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    /* ── Panel ── */
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      min-height: 520px;
      overflow: hidden;
    }

    .panel-head {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .panel-head h2 {
      font-size: .75rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .panel-actions { display: flex; gap: 6px; }

    .btn-sm {
      padding: 5px 11px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      font-size: .78rem;
      cursor: pointer;
      color: var(--muted);
      transition: all .15s;
      white-space: nowrap;
    }
    .btn-sm:hover { border-color: var(--primary); color: var(--primary); }
    .btn-sm:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Textarea ── */
    #input {
      flex: 1;
      border: none;
      outline: none;
      padding: 16px;
      font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace;
      font-size: .8rem;
      line-height: 1.65;
      resize: none;
      color: var(--text);
    }
    #input::placeholder { color: #cbd5e1; }

    .panel-foot {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .char-count { font-size: .74rem; color: var(--muted); }

    #btn-submit {
      padding: 9px 22px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: background .15s;
    }
    #btn-submit:hover:not(:disabled) { background: var(--primary-dark); }
    #btn-submit:disabled { background: #94a3b8; cursor: not-allowed; }

    /* Ctrl+Enter hint */
    .shortcut-hint {
      font-size: .7rem;
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    kbd {
      background: #e2e8f0;
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      padding: 1px 5px;
      font-size: .7rem;
      font-family: inherit;
    }

    /* ── Output ── */
    #output {
      flex: 1;
      overflow: auto;
      position: relative;
    }
    #output pre {
      margin: 0;
      min-height: 100%;
    }
    #output pre code {
      font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace;
      font-size: .8rem;
      line-height: 1.65;
      border-radius: 0 !important;
    }

    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 400px;
      gap: 12px;
      color: #cbd5e1;
      text-align: center;
      padding: 40px;
      font-size: .9rem;
    }

    /* ── Loading ── */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      gap: 14px;
      color: var(--muted);
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Report ── */
    .report {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .report-head {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    .report-head h2 {
      font-size: .75rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .report-stats { display: flex; gap: 8px; flex-wrap: wrap; }
    .stat {
      font-size: .78rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .stat-fix     { background: #dcfce7; color: var(--success); }
    .stat-clean   { background: #dbeafe; color: var(--primary); }
    .stat-warning { background: #fef3c7; color: var(--warning); }

    .report-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .change-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: .875rem;
    }
    .change-item.fix     { background: #f0fdf4; border: 1px solid #bbf7d0; }
    .change-item.clean   { background: #eff6ff; border: 1px solid #bfdbfe; }
    .change-item.warning { background: #fffbeb; border: 1px solid #fde68a; }
    .change-icon { flex-shrink: 0; line-height: 1.5; }
    .change-desc { line-height: 1.55; }
    .change-wcag { font-size: .73rem; color: var(--muted); margin-top: 2px; }

    /* ── Error ── */
    .error-box {
      margin: 16px;
      padding: 14px 16px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      color: var(--danger);
      font-size: .875rem;
      line-height: 1.5;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: .875rem;
      opacity: 0;
      transition: opacity .2s;
      pointer-events: none;
      z-index: 999;
    }
    #toast.show { opacity: 1; }

    /* ── Responsive ── */
    @media (max-width: 800px) {
      .panels { grid-template-columns: 1fr; }
      main { padding: 16px; }
      .shortcut-hint { display: none; }
    }
  </style>
</head>
<body>

<!-- ══ Header ══ -->
<header>
  <div class="logo">
    <h1>無障礙內文潤飾工具</h1>
    <p>WCAG 2.1 自動清理與修復</p>
  </div>
</header>

<!-- ══ Main ══ -->
<main>
  <!-- 控制面板 (置中) -->
  <div class="control-bar">
    <div class="control-group">
      <label class="control-label" for="page-bg-color">頁面主體背景色</label>
      <input type="color" id="page-bg-color" value="#ffffff" title="設定發布頁面的預定背景色以計算對比">
    </div>
    <div class="control-group">
      <label class="control-label" for="existing-headings">頁面現有標題</label>
      <select id="existing-headings">
        <option value="none">無</option>
        <option value="h1">已有 h1</option>

    <div class="control-group">

      </div>
    </div>
  </div>

  <div class="panels">

    <!-- 輸入 -->
    <div class="panel">
      <div class="panel-head">
        <h2>輸入內容</h2>
        <div class="panel-actions">
          <button class="btn-sm" onclick="clearInput()">清除</button>
        </div>
      </div>
      <textarea id="input"
        placeholder="貼上 HTML 原始碼，或從 Word / Google Docs 複製的內容..."
        oninput="updateCount()"></textarea>
      <div class="panel-foot">
        <span class="shortcut-hint"><kbd>Ctrl</kbd>+<kbd>Enter</kbd> 送出</span>
        <span class="char-count" id="char-count">0 字元</span>
        <button id="btn-submit" onclick="run()">
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
              d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
          開始修復
        </button>
      </div>
    </div>

    <!-- 輸出 -->
    <div class="panel">
      <div class="panel-head">
        <h2>修復結果</h2>
        <div class="panel-actions">
          <button class="btn-sm" id="btn-reuse"    onclick="reuse()"    style="display:none">← 送回輸入</button>
          <button class="btn-sm" id="btn-copy"     onclick="copyHTML()" style="display:none">複製</button>
          <button class="btn-sm" id="btn-download" onclick="download()" style="display:none">下載 .html</button>
        </div>
      </div>
      <div id="output">
        <div class="placeholder">
          <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586
                 a1 1 0 01.707.293l5.414 5.414A1 1 0 0119 9.414V19a2 2 0 01-2 2z"/>
          </svg>
          修復後的 HTML 將顯示在這裡
        </div>
      </div>
    </div>
  </div>

  <!-- 修改報告 -->
  <div class="report" id="report" style="display:none">
    <div class="report-head">
      <h2>修改報告</h2>
      <div class="report-stats" id="report-stats"></div>
    </div>
    <div class="report-body" id="report-body"></div>
  </div>
</main>

<div id="toast">已複製到剪貼簿</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
// ════════════════════════════════════════════
//  設定區：部署 Cloudflare Worker 後填入網址
// ════════════════════════════════════════════
const WORKER_URL = 'https://weathered-boat-76be.love520297.workers.dev';
// ════════════════════════════════════════════

let level = 'AA';
let lastOutput = '';

// ════════════════════════════════════════════
//  顏色對比度精準運算工具 (JavaScript 色彩演算法)
// ════════════════════════════════════════════
function hexToRgb(hex) {
  let c = hex.substring(1).split('');
  if (c.length === 3) c = [c[0], c[0], c[1], c[1], c[2], c[2]];
  c = '0x' + c.join('');
  return [(c >> 16) & 255, (c >> 8) & 255, c & 255];
}

function parseColorToRgb(colorStr) {
  if (!colorStr) return null;
  colorStr = colorStr.trim();
  if (colorStr.startsWith('#')) return hexToRgb(colorStr);
  let rgbMatch = colorStr.match(/^rgba?\((\d+),\s*(\d+),\s*(\d+)/i);
  if (rgbMatch) return [parseInt(rgbMatch[1]), parseInt(rgbMatch[2]), parseInt(rgbMatch[3])];
  if(colorStr === 'white') return [255,255,255];
  if(colorStr === 'black') return [0,0,0];
  return null;
}

function RgbToHex(r, g, b) {
  return "#" + (1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1).toUpperCase();
}

function getLuminance(r, g, b) {
  let a = [r, g, b].map(function (v) {
    v /= 255;
    return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
  });
  return a[0] * 0.2126 + a[1] * 0.7152 + a[2] * 0.0722;
}

function getContrastRatio(l1, l2) {
  let lightest = Math.max(l1, l2);
  let darkest = Math.min(l1, l2);
  return (lightest + 0.05) / (darkest + 0.05);
}

function getTargetRatio(fontSizeStr, fontWeightStr, level) {
  let isLarge = false;
  let pt = 12; 
  if (fontSizeStr) {
    let matchPx = fontSizeStr.match(/(\d+(?:\.\d+)?)px/i);
    let matchPt = fontSizeStr.match(/(\d+(?:\.\d+)?)pt/i);
    if (matchPx) pt = parseFloat(matchPx[1]) * 0.75;
    if (matchPt) pt = parseFloat(matchPt[1]);
  }
  let isBold = fontWeightStr && (fontWeightStr === 'bold' || parseInt(fontWeightStr) >= 700);
  if (pt >= 18 || (pt >= 14 && isBold)) isLarge = true;
  if (level === 'AAA') return isLarge ? 4.5 : 7.0;
  return isLarge ? 3.0 : 4.5;
}

function adjustColorForContrast(rgbText, rgbBg, targetRatio) {
  let bgLum = getLuminance(...rgbBg);
  let textLum = getLuminance(...rgbText);
  let ratio = getContrastRatio(textLum, bgLum);
  if (ratio >= targetRatio) return { rgb: rgbText, adjusted: false };
  
  let isBgLight = bgLum > 0.5;
  let [r, g, b] = rgbText;
  let step = 2; 
  
  let loopCount = 0;
  while (ratio < targetRatio && loopCount < 100) {
    if (isBgLight) {
      r = Math.max(0, r - step);
      g = Math.max(0, g - step);
      b = Math.max(0, b - step);
    } else {
      r = Math.min(255, r + step);
      g = Math.min(255, g + step);
      b = Math.min(255, b + step);
    }
    textLum = getLuminance(r, g, b);
    ratio = getContrastRatio(textLum, bgLum);
    loopCount++;
    if ((r===0 && g===0 && b===0) || (r===255 && g===255 && b===255)) break;
  }
  return { rgb: [r, g, b], adjusted: true };
}

function processHTMLContrast(htmlStr, pageBgHex, wcagLevel) {
  // 防呆：如果是空的就跳過
  if (!htmlStr || !htmlStr.trim()) return { html: htmlStr, count: 0 };
  
  const parser = new DOMParser();
  const doc = parser.parseFromString(htmlStr, 'text/html');
  const pageBgRgb = hexToRgb(pageBgHex);
  let changeCount = 0;

  function checkNode(node, currentBgRgb) {
    if (node.nodeType === Node.ELEMENT_NODE) {
      let nodeBgRgb = currentBgRgb;
      let styleBg = node.style?.backgroundColor || node.style?.background;
      let parsedBg = parseColorToRgb(styleBg);
      if (parsedBg) nodeBgRgb = parsedBg;

      let styleColor = node.style?.color;
      if (styleColor) {
         let parsedColor = parseColorToRgb(styleColor);
         if (parsedColor) {
           let targetRatio = getTargetRatio(node.style?.fontSize, node.style?.fontWeight, wcagLevel);
           let result = adjustColorForContrast(parsedColor, nodeBgRgb, targetRatio);
           if (result.adjusted) {
             node.style.color = RgbToHex(...result.rgb);
             changeCount++;
           }
         }
      }
      for (let child of node.childNodes) checkNode(child, nodeBgRgb);
    }
  }
  
  for (let child of doc.body.childNodes) checkNode(child, pageBgRgb);
  return { html: doc.body.innerHTML, count: changeCount };
}

function getHeadingInstruction() {
  const v = document.getElementById('existing-headings').value;
  const map = {
    none:   '標題層級無限制，修正時確保不跳層即可。',
    h1:     '頁面已有 h1，內容中最高標題只能使用 h2，不可出現 h1。',
    h1h2:   '頁面已有 h1 和 h2，內容中最高標題只能使用 h3，不可出現 h1 或 h2。',
    h1h2h3: '頁面已有 h1、h2、h3，內容中最高標題只能使用 h4，不可出現 h1、h2 或 h3。'
  };
  return map[v];
}
function setLevel(v) {
  level = v;
  document.getElementById('btn-aa').classList.toggle('active',  v === 'AA');
  document.getElementById('btn-aaa').classList.toggle('active', v === 'AAA');
}

function clearInput() {
  document.getElementById('input').value = '';
  updateCount();
}

function updateCount() {
  const n = document.getElementById('input').value.length;
  document.getElementById('char-count').textContent = n.toLocaleString() + ' 字元';
}

function reuse() {
  document.getElementById('input').value = lastOutput;
  updateCount();
  resetOutput();
}

function resetOutput() {
  lastOutput = '';
  document.getElementById('output').innerHTML = `
    <div class="placeholder">
      <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586
             a1 1 0 01.707.293l5.414 5.414A1 1 0 0119 9.414V19a2 2 0 01-2 2z"/>
      </svg>
      修復後的 HTML 將顯示在這裡
    </div>`;
  ['btn-copy','btn-download','btn-reuse'].forEach(id =>
    document.getElementById(id).style.display = 'none');
  document.getElementById('report').style.display = 'none';
}

function copyHTML() {
  navigator.clipboard.writeText(lastOutput).then(() => showToast('已複製到剪貼簿'));
}

function download() {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([lastOutput], { type: 'text/html' }));
  a.download = 'accessible.html';
  a.click();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── 主流程 ──
async function run() {
  const input = document.getElementById('input').value.trim();
  if (!input) { showToast('請先貼上內容'); return; }

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.innerHTML = `<div class="spinner" style="width:15px;height:15px;border-width:2px;margin:0"></div> 處理中...`;

  const bgColor = document.getElementById('page-bg-color').value;

  document.getElementById('output').innerHTML =
    `<div class="loading"><div class="spinner"></div><p>正在分析並修復...</p></div>`;
  document.getElementById('report').style.display = 'none';
  ['btn-copy','btn-download','btn-reuse'].forEach(id =>
    document.getElementById(id).style.display = 'none');

  const systemPrompt = `你是一位專業的 HTML/CSS 無障礙工程師。請清理並修復以下 HTML 與 CSS，使其符合 WCAG 2.1 ${level} 標準。

【第一步：清理垃圾內容與結構優化】
1. 移除 Microsoft Word 與 Google Docs 殘留標籤：mso-*、docs-internal-guid-*、<o:p>、xml 宣告、與工具殘留的無語意 class (如 MsoNormal)。
2. 清理多餘節點與字體：合併或移除雜亂且無意義的多層次 <span> 標籤嵌套。強制移除如 'Comic Sans MS' 等不專業且干擾閱讀的字體設定。
3. 移除空白標籤：清空內容只含空白或 &nbsp; 的 <p>、<span>、<div>。
4. 清理排版：超過 2 個連續 <br> 只保留 1 個，移除段落開頭或排版濫用的 &nbsp;。

【第二步：樣式處理與 UI UX Pro Max 設計升級】
已知發布頁面的主背景色為 ${bgColor}。

1. 獨立 <style> 標籤：必須完整保留並美化排版。若發現色彩對比度不足（未達 WCAG ${level}）或缺少焦點樣式（如 outline: none 卻無 :focus），請結合背景色修復，記錄於 changes。

2. 行內樣式（style="..."）：若為無意義字型宣告則移除；若行內文字顏色與背景對比有閱讀困難風險，請移除該色彩讓文字繼承安全色。

3. 【UI UX Pro Max 內容設計升級】：在保持內容結構不變的前提下，依以下規範全面升級視覺呈現：
   - 版面架構：為標題、段落、清單、表格、區塊等元素建立清晰的視覺層次，善用 padding/margin/line-height 建立呼吸感。
   - 色彩系統：移除雜亂的行內色彩，改用統一的專業配色（主文 #1e293b、副文 #64748b、強調色 #2563eb，均需符合 WCAG ${level} 對比規範）。
   - 標題樣式：h2 使用 border-left 色塊或 border-bottom 底線強化視覺識別，h3 以粗體+字母間距處理。
   - 段落與清單：段落 line-height 1.8；清單項目 padding-left 1.5em、li margin-bottom 0.5em；移除手動編號，改為語意化 ol/ul。
   - 強調與引用：<strong> 改用帶底色的 highlight 樣式；需要特別標示的資訊區塊使用 border-left + 淡背景色的 callout 設計。
   - 表格美化：加上 border-collapse、交替行底色、thead 底色與粗體，欄寬合理分配。
   - 圖片：加上 border-radius: 8px、box-shadow 輕陰影與 max-width: 100%。
   - RWD：所有固定像素寬度改為 max-width 或百分比；行動端字體不小於 14px。

4. 【CSS 整合輸出規則（CKEditor 貼入優化）】：將所有行內 style 屬性中可複用的樣式，以及原始 <style> 標籤內容，統一整理成**一個 <style> 區塊**，放在輸出 HTML 的**最上方**。原本行內 style 改為引用 class 名稱，讓整份 HTML 乾淨易讀。使用者可直接將完整輸出貼入 CKEditor 原始碼編輯位置，CSS 與 HTML 一目了然。

【第三步：無障礙與語意化修復（WCAG 2.1 ${level}）】
1. 標題與大綱優化：${getHeadingInstruction()} 若原始「具有大字體設計感的標題」被迫調整層級，可使用合理的 style 保留其視覺大小；若是利用粗體 <p> 偽裝的標題，請轉換為正確的標題標籤 <hX>，既保有設計感又符合規範。
2. 語意化清單：將手動輸入編號的段落（如 1. 2. 3. 等）自動轉換為語意化的 <ol> 標籤與 <li> 標籤；項目符號轉為 <ul>，讓報讀系統能正確識別清單。
3. 無障礙連結補強：<a> 的連結若為「點此」等無意義文字，請標記需人工修改。如果是外部或開啟新視窗連結，請強制補齊 target="_blank"、rel="noopener noreferrer" 與合適的 title 語音提示。
4. 圖片與行動端 RWD 處理：移除 <img>、<p>、<div> 等元素寫死的固定寬度（如 width: XXpx），改用百分比或 max-width 以提升手機端可讀性。<img> 加上 style="max-width: 100%; height: auto;" 防失真並推論補填 alt。
5. 表格與 <iframe>：<table> 必須補上 <th scope="col"> 或 <th scope="row">；為了避免行動端表格破版，請自動在 <table> 外層包覆 <div style="overflow-x: auto;">。iframe 推測補上 title。
6. 表單與其他：將 tabindex 大於 0 的值移除或改為 0；確保 <button> 有可見文字或 aria-label。

請只回傳以下 JSON 格式，不要加任何內文說明（【重要】確保回傳的是嚴格合法的 JSON，"html" 欄位值若有雙引號請轉義，且所有換行符號必須轉義為 \\n，不可出現未轉義的換行！）：
{
  "html": "修復後的完整 HTML",
  "changes": [
    { "type": "clean", "description": "說明清理了什麼" },
    { "type": "fix",   "description": "說明修復了什麼", "wcag": "WCAG 條款編號" },
    { "type": "warning", "description": "需人工確認的項目" }
  ]
}`;

  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 8192,
        system: systemPrompt,
        messages: [{ role: 'user', content: input }]
      })
    });

    if (!res.ok) {
      const errBody = await res.json().catch(() => ({}));
      throw new Error(`錯誤 ${res.status}：${JSON.stringify(errBody)}`);
    }

    const data = await res.json();
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));

    const text = data.content?.[0]?.text;
    if (!text) throw new Error('回應內容為空，請重試');

    // 解析 JSON（容忍 Claude 偶爾加多餘文字）
    const jsonMatch = text.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('回應格式異常，請重試');
    const result = JSON.parse(jsonMatch[0]);

    // JS 前端對比度運算精準攔截
    const postProcess = processHTMLContrast(result.html || '', bgColor, level);
    lastOutput = postProcess.html;

    let finalChanges = result.changes || [];
    if (postProcess.count > 0) {
      finalChanges.push({
        type: 'fix',
        description: `利用色彩演算法動態深淺校正，調整了 ${postProcess.count} 處行內樣式色彩對比度，準確滿足 WCAG ${level} 標準。`,
        wcag: (level === 'AAA' ? '1.4.6' : '1.4.3')
      });
    }

    // 語法高亮顯示
    const escaped = lastOutput
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    document.getElementById('output').innerHTML =
      `<pre><code class="language-html">${escaped}</code></pre>`;
    hljs.highlightAll();

    // 顯示操作按鈕
    ['btn-copy','btn-download','btn-reuse'].forEach(id =>
      document.getElementById(id).style.display = 'inline-flex');

    // 建立報告
    buildReport(finalChanges);

  } catch (err) {
    document.getElementById('output').innerHTML =
      `<div class="error-box">❌ ${err.message}</div>`;
  }

  btn.disabled = false;
  btn.innerHTML = `<svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"/>
  </svg> 開始修復`;
}

function buildReport(changes) {
  const counts = {};
  changes.forEach(c => { counts[c.type] = (counts[c.type] || 0) + 1; });

  const statsEl = document.getElementById('report-stats');
  statsEl.innerHTML = [
    counts.fix     ? `<span class="stat stat-fix">✅ 修復 ${counts.fix} 項</span>` : '',
    counts.clean   ? `<span class="stat stat-clean">🧹 清理 ${counts.clean} 項</span>` : '',
    counts.warning ? `<span class="stat stat-warning">⚠️ 待確認 ${counts.warning} 項</span>` : ''
  ].join('');

  const icon = { fix: '✅', clean: '🧹', warning: '⚠️' };
  document.getElementById('report-body').innerHTML = changes.map(c => `
    <div class="change-item ${c.type}">
      <span class="change-icon">${icon[c.type] || '•'}</span>
      <div>
        <div class="change-desc">${c.description}</div>
        ${c.wcag ? `<div class="change-wcag">WCAG ${c.wcag}</div>` : ''}
      </div>
    </div>`).join('');

  document.getElementById('report').style.display = 'block';
}

// Ctrl / Cmd + Enter 快捷鍵
document.getElementById('input').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') run();
});
</script>
