<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>無障礙內文潤飾工具</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css">
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --success: #16a34a;
      --warning: #d97706;
      --danger: #dc2626;
      --bg: #f1f5f9;
      --panel: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }

    .logo { text-align: center; }
    .logo h1 { font-size: 1.1rem; font-weight: 700; }
    .logo p  { font-size: .72rem; color: var(--muted); margin-top: 1px; }

    .level-toggle {
      display: flex;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
      gap: 2px;
    }
    .level-toggle button {
      padding: 6px 18px;
      border: none;
      border-radius: 6px;
      font-size: .85rem;
      font-weight: 700;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      transition: all .15s;
    }
    .level-toggle button.active {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 1px 4px rgba(37,99,235,.35);
    }

    /* ── Control Bar ── */
    .control-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      background: var(--panel);
      padding: 14px 24px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      margin-bottom: 4px;
    }
    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
      border-right: 1px solid var(--border);
      padding-right: 16px;
    }
    .control-group:last-child { border-right: none; padding-right: 0; }
    .control-label {
      font-size: .8rem;
      color: var(--text);
      font-weight: 600;
      white-space: nowrap;
    }
    .control-bar select {
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: .85rem;
      background: #fff;
      color: var(--text);
      cursor: pointer;
      outline: none;
    }
    input[type="color"] {
      cursor: pointer;
      width: 30px;
      height: 30px;
      padding: 0;
      border: none;
      border-radius: 6px;
      outline: none;
    }

    /* ── Layout ── */
    main {
      max-width: 1440px;
      margin: 0 auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    /* ── Panel ── */
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      min-height: 520px;
      overflow: hidden;
    }

    .panel-head {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .panel-head h2 {
      font-size: .75rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .panel-actions { display: flex; gap: 6px; }

    .btn-sm {
      padding: 5px 11px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      font-size: .78rem;
      cursor: pointer;
      color: var(--muted);
      transition: all .15s;
      white-space: nowrap;
    }
    .btn-sm:hover { border-color: var(--primary); color: var(--primary); }
    .btn-sm:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Textarea ── */
    #input {
      flex: 1;
      border: none;
      outline: none;
      padding: 16px;
      font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace;
      font-size: .8rem;
      line-height: 1.65;
      resize: none;
      color: var(--text);
    }
    #input::placeholder { color: #cbd5e1; }

    .panel-foot {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .char-count { font-size: .74rem; color: var(--muted); }

    #btn-submit {
      padding: 9px 22px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: background .15s;
    }
    #btn-submit:hover:not(:disabled) { background: var(--primary-dark); }
    #btn-submit:disabled { background: #94a3b8; cursor: not-allowed; }

    /* Ctrl+Enter hint */
    .shortcut-hint {
      font-size: .7rem;
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    kbd {
      background: #e2e8f0;
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      padding: 1px 5px;
      font-size: .7rem;
      font-family: inherit;
    }

    /* ── Output ── */
    #output {
      flex: 1;
      overflow: auto;
      position: relative;
    }
    #output pre {
      margin: 0;
      min-height: 100%;
    }
    #output pre code {
      font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace;
      font-size: .8rem;
      line-height: 1.65;
      border-radius: 0 !important;
    }

    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 400px;
      gap: 12px;
      color: #cbd5e1;
      text-align: center;
      padding: 40px;
      font-size: .9rem;
    }

    /* ── Loading ── */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      gap: 14px;
      color: var(--muted);
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Report ── */
    .report {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .report-head {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    .report-head h2 {
      font-size: .75rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .report-stats { display: flex; gap: 8px; flex-wrap: wrap; }
    .stat {
      font-size: .78rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .stat-fix     { background: #dcfce7; color: var(--success); }
    .stat-clean   { background: #dbeafe; color: var(--primary); }
    .stat-warning { background: #fef3c7; color: var(--warning); }

    .report-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .change-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: .875rem;
    }
    .change-item.fix     { background: #f0fdf4; border: 1px solid #bbf7d0; }
    .change-item.clean   { background: #eff6ff; border: 1px solid #bfdbfe; }
    .change-item.warning { background: #fffbeb; border: 1px solid #fde68a; }
    .change-icon { flex-shrink: 0; line-height: 1.5; }
    .change-desc { line-height: 1.55; }
    .change-wcag { font-size: .73rem; color: var(--muted); margin-top: 2px; }

    /* ── Error ── */
    .error-box {
      margin: 16px;
      padding: 14px 16px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      color: var(--danger);
      font-size: .875rem;
      line-height: 1.5;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: .875rem;
      opacity: 0;
      transition: opacity .2s;
      pointer-events: none;
      z-index: 999;
    }
    #toast.show { opacity: 1; }

    /* ── Responsive ── */
    @media (max-width: 800px) {
      .panels { grid-template-columns: 1fr; }
      main { padding: 16px; }
      .shortcut-hint { display: none; }
    }

    /* ── Output Tabs ── */
    .panel-head-left { display: flex; align-items: center; gap: 12px; }
    .output-tabs { display: flex; gap: 4px; }
    .tab-btn {
      padding: 4px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      font-size: .75rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--muted);
      transition: all .15s;
    }
    .tab-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .tab-btn:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
    #preview-frame {
      flex: 1;
      border: none;
      width: 100%;
      min-height: 480px;
      display: none;
    }
    .streaming-indicator {
      padding: 2.5rem 1rem;
      text-align: center;
      color: var(--muted);
      font-size: .9rem;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .35; }
    }
  </style>
</head>
<body>

<!-- ══ Header ══ -->
<header>
  <div class="logo">
    <h1>無障礙內文潤飾工具</h1>
    <p>WCAG 2.2 AAA 自動清理與修復</p>
  </div>
</header>

<!-- ══ Main ══ -->
<main>
  <!-- 控制面板 (置中) -->
  <div class="control-bar">
    <div class="control-group">
      <label class="control-label" for="page-bg-color">頁面主體背景色</label>
      <input type="color" id="page-bg-color" value="#ffffff" title="設定發布頁面的預定背景色以計算對比">
    </div>
    <div class="control-group">
      <div class="level-toggle">
        <button id="btn-aa"  onclick="setLevel('AA')">AA</button>
        <button id="btn-aaa" onclick="setLevel('AAA')" class="active">AAA</button>
      </div>
    </div>
  </div>

  <div class="panels">

    <!-- 輸入 -->
    <div class="panel">
      <div class="panel-head">
        <h2>輸入內容</h2>
        <div class="panel-actions">
          <button class="btn-sm" onclick="clearInput()">清除</button>
        </div>
      </div>
      <textarea id="input"
        placeholder="貼上 HTML 原始碼，或從 Word / Google Docs 複製的內容..."
        oninput="updateCount()"></textarea>
      <div class="panel-foot">
        <span class="shortcut-hint"><kbd>Ctrl</kbd>+<kbd>Enter</kbd> 送出</span>
        <span class="char-count" id="char-count">0 字元</span>
        <button id="btn-submit" onclick="run()">
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
              d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
          開始修復
        </button>
      </div>
    </div>

    <!-- 輸出 -->
    <div class="panel">
      <div class="panel-head">
        <div class="panel-head-left">
          <h2>修復結果</h2>
          <div class="output-tabs" role="tablist" aria-label="輸出檢視模式">
            <button type="button" class="tab-btn active" id="tab-code" role="tab" aria-selected="true" onclick="showTab('code')">原始碼</button>
            <button type="button" class="tab-btn" id="tab-preview" role="tab" aria-selected="false" onclick="showTab('preview')">預覽</button>
          </div>
        </div>
        <div class="panel-actions">
          <button class="btn-sm" id="btn-reuse"    onclick="reuse()"    style="display:none">← 送回輸入</button>
          <button class="btn-sm" id="btn-copy"     onclick="copyHTML()" style="display:none">複製</button>
          <button class="btn-sm" id="btn-download" onclick="download()" style="display:none">下載 .html</button>
        </div>
      </div>
      <div id="output">
        <div class="placeholder">
          <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586
                 a1 1 0 01.707.293l5.414 5.414A1 1 0 0119 9.414V19a2 2 0 01-2 2z"/>
          </svg>
          修復後的 HTML 將顯示在這裡
        </div>
      </div>
      <iframe id="preview-frame" sandbox="allow-same-origin" title="修復後 HTML 靜態預覽"></iframe>
    </div>
  </div>

  <!-- 修改報告 -->
  <div class="report" id="report" style="display:none">
    <div class="report-head">
      <h2>修改報告</h2>
      <div class="report-stats" id="report-stats"></div>
    </div>
    <div class="report-body" id="report-body"></div>
  </div>
</main>

<div id="toast">已複製到剪貼簿</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
// ════════════════════════════════════════════
//  設定區：部署 Cloudflare Worker 後填入網址
// ════════════════════════════════════════════
const WORKER_URL = 'https://weathered-boat-76be.love520297.workers.dev';
// ════════════════════════════════════════════

let level = 'AAA';
let lastOutput = '';
let currentTab = 'code';

function showTab(tab) {
  currentTab = tab;
  const codeEl  = document.getElementById('output');
  const frameEl = document.getElementById('preview-frame');
  const tabCode = document.getElementById('tab-code');
  const tabPrev = document.getElementById('tab-preview');
  const isPreview = tab === 'preview';
  codeEl.style.display  = isPreview ? 'none' : '';
  frameEl.style.display = isPreview ? 'block' : 'none';
  tabCode.classList.toggle('active', !isPreview);
  tabPrev.classList.toggle('active',  isPreview);
  tabCode.setAttribute('aria-selected', String(!isPreview));
  tabPrev.setAttribute('aria-selected', String(isPreview));
}

// ════════════════════════════════════════════
//  顏色對比度精準運算工具 (JavaScript 色彩演算法)
// ════════════════════════════════════════════
function hexToRgb(hex) {
  let c = hex.substring(1).split('');
  if (c.length === 3) c = [c[0], c[0], c[1], c[1], c[2], c[2]];
  c = '0x' + c.join('');
  return [(c >> 16) & 255, (c >> 8) & 255, c & 255];
}

function parseColorToRgb(colorStr) {
  if (!colorStr) return null;
  colorStr = colorStr.trim();
  if (colorStr.startsWith('#')) return hexToRgb(colorStr);
  let rgbMatch = colorStr.match(/^rgba?\((\d+),\s*(\d+),\s*(\d+)/i);
  if (rgbMatch) return [parseInt(rgbMatch[1]), parseInt(rgbMatch[2]), parseInt(rgbMatch[3])];
  if(colorStr === 'white') return [255,255,255];
  if(colorStr === 'black') return [0,0,0];
  return null;
}

function RgbToHex(r, g, b) {
  return "#" + (1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1).toUpperCase();
}

function getLuminance(r, g, b) {
  let a = [r, g, b].map(function (v) {
    v /= 255;
    return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
  });
  return a[0] * 0.2126 + a[1] * 0.7152 + a[2] * 0.0722;
}

function getContrastRatio(l1, l2) {
  let lightest = Math.max(l1, l2);
  let darkest = Math.min(l1, l2);
  return (lightest + 0.05) / (darkest + 0.05);
}

function getTargetRatio(fontSizeStr, fontWeightStr, level) {
  let isLarge = false;
  let pt = 12; 
  if (fontSizeStr) {
    let matchPx = fontSizeStr.match(/(\d+(?:\.\d+)?)px/i);
    let matchPt = fontSizeStr.match(/(\d+(?:\.\d+)?)pt/i);
    if (matchPx) pt = parseFloat(matchPx[1]) * 0.75;
    if (matchPt) pt = parseFloat(matchPt[1]);
  }
  let isBold = fontWeightStr && (fontWeightStr === 'bold' || parseInt(fontWeightStr) >= 700);
  if (pt >= 18 || (pt >= 14 && isBold)) isLarge = true;
  if (level === 'AAA') return isLarge ? 4.5 : 7.0;
  return isLarge ? 3.0 : 4.5;
}

function adjustColorForContrast(rgbText, rgbBg, targetRatio) {
  let bgLum = getLuminance(...rgbBg);
  let textLum = getLuminance(...rgbText);
  let ratio = getContrastRatio(textLum, bgLum);
  if (ratio >= targetRatio) return { rgb: rgbText, adjusted: false };
  
  let isBgLight = bgLum > 0.5;
  let [r, g, b] = rgbText;
  let step = 2; 
  
  let loopCount = 0;
  while (ratio < targetRatio && loopCount < 100) {
    if (isBgLight) {
      r = Math.max(0, r - step);
      g = Math.max(0, g - step);
      b = Math.max(0, b - step);
    } else {
      r = Math.min(255, r + step);
      g = Math.min(255, g + step);
      b = Math.min(255, b + step);
    }
    textLum = getLuminance(r, g, b);
    ratio = getContrastRatio(textLum, bgLum);
    loopCount++;
    if ((r===0 && g===0 && b===0) || (r===255 && g===255 && b===255)) break;
  }
  return { rgb: [r, g, b], adjusted: true };
}

function processHTMLContrast(htmlStr, pageBgHex, wcagLevel) {
  // 防呆：如果是空的就跳過
  if (!htmlStr || !htmlStr.trim()) return { html: htmlStr, count: 0 };
  
  const parser = new DOMParser();
  const doc = parser.parseFromString(htmlStr, 'text/html');
  const pageBgRgb = hexToRgb(pageBgHex);
  let changeCount = 0;

  function checkNode(node, currentBgRgb) {
    if (node.nodeType === Node.ELEMENT_NODE) {
      let nodeBgRgb = currentBgRgb;
      let styleBg = node.style?.backgroundColor || node.style?.background;
      let parsedBg = parseColorToRgb(styleBg);
      if (parsedBg) nodeBgRgb = parsedBg;

      let styleColor = node.style?.color;
      if (styleColor) {
         let parsedColor = parseColorToRgb(styleColor);
         if (parsedColor) {
           let targetRatio = getTargetRatio(node.style?.fontSize, node.style?.fontWeight, wcagLevel);
           let result = adjustColorForContrast(parsedColor, nodeBgRgb, targetRatio);
           if (result.adjusted) {
             node.style.color = RgbToHex(...result.rgb);
             changeCount++;
           }
         }
      }
      for (let child of node.childNodes) checkNode(child, nodeBgRgb);
    }
  }
  
  for (let child of doc.body.childNodes) checkNode(child, pageBgRgb);
  return { html: doc.body.innerHTML, count: changeCount };
}

function setLevel(v) {
  level = v;
  document.getElementById('btn-aa').classList.toggle('active',  v === 'AA');
  document.getElementById('btn-aaa').classList.toggle('active', v === 'AAA');
}

function clearInput() {
  document.getElementById('input').value = '';
  updateCount();
}

function updateCount() {
  const n = document.getElementById('input').value.length;
  document.getElementById('char-count').textContent = n.toLocaleString() + ' 字元';
}

function reuse() {
  document.getElementById('input').value = lastOutput;
  updateCount();
  resetOutput();
}

function resetOutput() {
  lastOutput = '';
  document.getElementById('output').innerHTML = `
    <div class="placeholder">
      <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586
             a1 1 0 01.707.293l5.414 5.414A1 1 0 0119 9.414V19a2 2 0 01-2 2z"/>
      </svg>
      修復後的 HTML 將顯示在這裡
    </div>`;
  document.getElementById('preview-frame').srcdoc = '';
  showTab('code');
  ['btn-copy','btn-download','btn-reuse'].forEach(id =>
    document.getElementById(id).style.display = 'none');
  document.getElementById('report').style.display = 'none';
}

function copyHTML() {
  navigator.clipboard.writeText(lastOutput).then(() => showToast('已複製到剪貼簿'));
}

function download() {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([lastOutput], { type: 'text/html' }));
  a.download = 'accessible.html';
  a.click();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── 主流程 ──
async function run() {
  const input = document.getElementById('input').value.trim();
  if (!input) { showToast('請先貼上內容'); return; }
  if (input.length > 8000) {
    showToast(`⚠️ 內容共 ${input.length.toLocaleString()} 字元，過長可能逾時，建議分段貼入（每次 ≤ 8,000 字元）`);
  }

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.innerHTML = `<div class="spinner" style="width:15px;height:15px;border-width:2px;margin:0"></div> 處理中...`;

  const bgColor = document.getElementById('page-bg-color').value;

  document.getElementById('output').innerHTML =
    `<div class="loading"><div class="spinner"></div><p>正在分析並修復...</p></div>`;
  document.getElementById('report').style.display = 'none';
  ['btn-copy','btn-download','btn-reuse'].forEach(id =>
    document.getElementById(id).style.display = 'none');

  const systemPrompt = `你是一位頂尖的前端開發者兼 UI 設計師，精通平衡嚴格的 WCAG 2.2 ${level} 無障礙規範與 UI UX Pro Max 的現代設計美學。

## 核心目標
將輸入內容轉化為：
- 符合 WCAG 2.2 ${level} 標準的無障礙結構（${level === 'AAA' ? '對比比例需達 7:1' : '對比比例需達 4.5:1 一般 / 3:1 大字'}）
- 視覺整潔且易於閱讀的原始碼
- 從 h3 開始且不跨級的清晰標題層次
- 所有 CSS 樣式集中於 <style> 區塊，置於輸出最上方

---

## 第一部分：前置清理

移除 Microsoft Word / Google Docs 殘留標籤（mso-*、docs-internal-guid-*、<o:p>、MsoNormal class）。
清理多餘 <span> 巢套、移除 Comic Sans MS 等不適合閱讀的字體宣告。
移除僅含空白或 &nbsp; 的空標籤；超過 2 個連續 <br> 只保留 1 個。

---

## 第二部分：強制對比度

所有顏色相關 CSS 屬性（color、background-color、border-color）必須全面加上 !important，嚴防外部樣式覆寫。
互動元件（按鈕、連結）顏色必須達到 WCAG ${level} 對比標準。
成功範例：白色文字 (#FFFFFF) 搭配深色背景（深石墨、深灰、黑色）。
嚴禁：深橙色背景搭配灰色文字。

---

## 第三部分：結構與語意規範

1. 版面：所有 Wrapper / Container 使用 width: 100% !important;，嚴禁 max-width。
2. 標題層次：固定從 <h3> 開始，嚴格遞增（h3 → h4 → h5），嚴禁跨級。若原始為粗體 <p> 偽裝的標題，轉換為正確 <hX> 標籤。
3. 語意標籤：嚴禁用 div/span 模擬互動元件，必須用原生 <button> 或 <a>。
4. ARIA 標註：為所有有意義的元件添加 role 與 aria-* 屬性（aria-expanded、aria-label 等）。
5. 超連結：嚴禁裸露 URL；外部或開啟新視窗連結補齊 target="_blank" rel="noopener noreferrer"；下載連結需加 title 與 aria-label 說明。
6. 圖片：嚴禁修改原始 src 路徑；alt 為空時依內容填補；固定像素寬高改為 max-width: 100%; height: auto;。
7. 文件下載連結：若頁面含文件下載連結，依以下規則強制補充雙格式無障礙說明：
   - Word 文件 → 同時提供 DOCX + ODT
   - Excel 試算表 → 同時提供 XLSX + ODS
   - PDF（閱讀用，如公告、簡章） → 僅需單一 PDF
   - PDF（填寫用，如申請書、表單） → 強制提供 PDF + 可編輯格式 (ODT/ODS)
   每個下載連結必須有獨立且明確的 aria-label 與 title，精確標註該連結的實體檔案格式。
8. 語意化清單：將手動輸入編號的段落（如 1. 2. 3.）自動轉為 <ol><li>；項目符號轉為 <ul><li>。
9. 表格與 iframe：<table> 補上 <th scope="col"> 或 <th scope="row"> 與 <caption>；iframe 補上 title。
10. 內容完整性：必須完整保留所有文字內容與資訊架構，嚴禁刪減或竄改原始文字。

---

## 第四部分：UI UX Pro Max 視覺美學系統

### 智慧型色彩變數
依內容主題生成符合對比標準的 CSS 變數，以 :root {} 包覆（頁面主背景色參考：${bgColor}）：
- --bg-body：頁面/容器背景，配合主背景色 ${bgColor}
- --bg-card：卡片背景，略深或略淺於 --bg-body
- --text-primary：主要文字，需與背景達到 WCAG ${level}
- --text-secondary：次要文字
- --color-primary：強調/連結色，強制深色調，確保與白字 (#FFFFFF) 達到 WCAG ${level}

### 卡片化佈局
內容區塊包裹在卡片容器內，套用：background-color: var(--bg-body) !important; margin-bottom: 24px;
（不強制圓角，保持保守幾何線條）

### 字體排版
- 全面禁用 font-weight: bold，改用數值
- 標題：font-weight: 600; letter-spacing: 0.025em; line-height: 1.6;
- 內文：font-weight: 400;

### 按鈕元件
- 主要按鈕：background: var(--color-primary); color: #FFFFFF !important;（確保 WCAG ${level} 對比）
- 次要按鈕：background: #FFFFFF; color: var(--text-primary) !important; 加深色邊框
- 選擇器綁定 HTML 標籤提高權重，範例：a.a11y-btn, button.a11y-btn
- 用排除選擇器隔離一般連結樣式，範例：.a11y-container a:not(.a11y-btn)

### 表格規範
- 完整語意：<table> <caption> <thead> <tbody> <th scope="col/row"> <td>
- 版型：table-layout: fixed; width: 100%;
- 禁用粗體；表頭用高對比背景色塊
- 多欄複雜表格必須加橫向滑動容器（role="region" aria-label="可橫向滑動查看完整表格" tabindex="0"，overflow-x:auto）

### 清單規範
- <ul>：list-style-type: disc !important;
- <ol>：list-style-type: decimal !important;
- 嚴禁 list-style: none
- <li>：margin-bottom: 12px !important; padding-left: 8px !important;
- 清單整體：padding-left: 24px !important;

---

## 第五部分：輸出規範

1. 嚴禁 HTML 標籤內的 inline style，所有樣式統一移入 <style> 區塊
2. <style> 置於輸出 HTML 最上方
3. 所有 CSS 宣告必須加上 !important
4. 選擇器權重需精確計算，避免衝突
5. 嚴禁輸出任何引用標記（如 [cite] 或 ^1^）

請只回傳以下格式，不要加任何其他說明或文字（HTML 直接輸出原始碼，無需跳脫）：

===HTML_START===
（修復後的完整 HTML 原始碼，<style> 區塊置於最上方）
===HTML_END===
===CHANGES_START===
[
  { "type": "clean", "description": "說明清理了什麼" },
  { "type": "fix",   "description": "說明修復了什麼", "wcag": "WCAG 條款編號" },
  { "type": "warning", "description": "需人工確認的項目" }
]
===CHANGES_END===`;

  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 8192,
        system: systemPrompt,
        messages: [{ role: 'user', content: input }]
      })
    });

    if (!res.ok) {
      const errText = await res.text().catch(() => '');
      let errBody = {};
      try { errBody = JSON.parse(errText); } catch (_) {}
      throw new Error(`伺服器錯誤 ${res.status}：${errBody?.error?.message || errText || `HTTP ${res.status}`}`);
    }

    // SSE 串流讀取
    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let sseBuffer = '';
    let fullText  = '';

    document.getElementById('output').innerHTML =
      '<div class="streaming-indicator">⚡ AI 生成中，請稍候...</div>';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      sseBuffer += decoder.decode(value, { stream: true });
      const lines = sseBuffer.split('\n');
      sseBuffer = lines.pop(); // 保留未完整的最後一行
      for (const line of lines) {
        if (!line.startsWith('data:')) continue;
        const raw = line.slice(5).trim();
        if (!raw || raw === '[DONE]') continue;
        let evt;
        try { evt = JSON.parse(raw); } catch (_) { continue; }
        if (evt.type === 'content_block_delta' && evt.delta?.type === 'text_delta') {
          fullText += evt.delta.text;
        }
        if (evt.type === 'error') throw new Error(evt.error?.message || 'API 串流錯誤');
      }
    }

    const text = fullText;
    if (!text) throw new Error('回應內容為空，請重試');

    // 用分隔符解析回應（避免 JSON 轉義問題）
    const htmlMatch    = text.match(/===HTML_START===\r?\n([\s\S]*?)\r?\n===HTML_END===/);
    const changesMatch = text.match(/===CHANGES_START===\r?\n([\s\S]*?)\r?\n===CHANGES_END===/);

    if (!htmlMatch) throw new Error('回應格式異常，請重試（AI 未依格式回傳）');

    let changes = [];
    if (changesMatch) {
      try { changes = JSON.parse(changesMatch[1].trim()); } catch (e) {
        changes = [{ type: 'warning', description: '修改報告解析失敗，但 HTML 已修復完成。' }];
      }
    }
    const result = { html: htmlMatch[1].trim(), changes };

    // JS 前端對比度運算精準攔截
    const postProcess = processHTMLContrast(result.html || '', bgColor, level);
    lastOutput = postProcess.html;

    let finalChanges = result.changes || [];
    if (postProcess.count > 0) {
      finalChanges.push({
        type: 'fix',
        description: `利用色彩演算法動態深淺校正，調整了 ${postProcess.count} 處行內樣式色彩對比度，準確滿足 WCAG ${level} 標準。`,
        wcag: (level === 'AAA' ? '1.4.6' : '1.4.3')
      });
    }

    // 語法高亮顯示
    const escaped = lastOutput
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    document.getElementById('output').innerHTML =
      `<pre><code class="language-html">${escaped}</code></pre>`;
    hljs.highlightAll();

    // 更新預覽 iframe
    document.getElementById('preview-frame').srcdoc = lastOutput;

    // 顯示操作按鈕
    ['btn-copy','btn-download','btn-reuse'].forEach(id =>
      document.getElementById(id).style.display = 'inline-flex');

    // 建立報告
    buildReport(finalChanges);

  } catch (err) {
    document.getElementById('output').innerHTML =
      `<div class="error-box">❌ ${err.message}</div>`;
  }

  btn.disabled = false;
  btn.innerHTML = `<svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"/>
  </svg> 開始修復`;
}

function buildReport(changes) {
  const counts = {};
  changes.forEach(c => { counts[c.type] = (counts[c.type] || 0) + 1; });

  const statsEl = document.getElementById('report-stats');
  statsEl.innerHTML = [
    counts.fix     ? `<span class="stat stat-fix">✅ 修復 ${counts.fix} 項</span>` : '',
    counts.clean   ? `<span class="stat stat-clean">🧹 清理 ${counts.clean} 項</span>` : '',
    counts.warning ? `<span class="stat stat-warning">⚠️ 待確認 ${counts.warning} 項</span>` : ''
  ].join('');

  const icon = { fix: '✅', clean: '🧹', warning: '⚠️' };
  document.getElementById('report-body').innerHTML = changes.map(c => `
    <div class="change-item ${c.type}">
      <span class="change-icon">${icon[c.type] || '•'}</span>
      <div>
        <div class="change-desc">${c.description}</div>
        ${c.wcag ? `<div class="change-wcag">WCAG ${c.wcag}</div>` : ''}
      </div>
    </div>`).join('');

  document.getElementById('report').style.display = 'block';
}

// Ctrl / Cmd + Enter 快捷鍵
document.getElementById('input').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') run();
});
</script>
